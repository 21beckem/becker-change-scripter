<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta http-equiv="Content-Security-Policy" content="default-src 'none';
               script-src  'unsafe-inline' https://cdnjs.cloudflare.com;
               style-src   'unsafe-inline' https://cdnjs.cloudflare.com;
               font-src    https://cdnjs.cloudflare.com data:;
               worker-src  blob: data:;
               img-src     data: blob: https:;
               connect-src https://cdnjs.cloudflare.com;">
	<link rel="stylesheet" href="./style.css">
</head>

<body>

	<!-- Left Panel -->
	<div id="left-panel">
		<div id="left-buttons">
			<button class="btn" id="btn-add">&#xFF0B;&#x2002;Add Stored Procedure</button>
			<button class="btn secondary" id="btn-view">&#x2398;&#x2002;View Change Script</button>
		</div>
		<div id="mini-map-label">Procedures</div>
		<div id="mini-map">
			<div class="mini-map-empty">No procedures added yet.</div>
		</div>
	</div>

	<!-- Main Area -->
	<div id="main-area">
		<div id="editor-header">
			<span id="proc-title">No procedure selected</span>
			<button id="btn-toggle-show-diff" class="header-toggle" style="display:none">
				<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640"><path d="M474.6 145.8C484.4 131.1 480.4 111.2 465.7 101.4C451 91.6 431.1 95.6 421.3 110.3L366.9 192L128 192C110.3 192 96 206.3 96 224C96 241.7 110.3 256 128 256L324.2 256L238.9 384L128 384C110.3 384 96 398.3 96 416C96 433.7 110.3 448 128 448L196.2 448L165.4 494.2C155.6 508.9 159.6 528.8 174.3 538.6C189 548.4 208.9 544.4 218.7 529.7L273.1 448L512 448C529.7 448 544 433.7 544 416C544 398.3 529.7 384 512 384L315.8 384L401.1 256L512 256C529.7 256 544 241.7 544 224C544 206.3 529.7 192 512 192L443.8 192L474.6 145.8z"/></svg>
				<span>
					Diff: On
				</span>
			</button>
			<button id="btn-toggle-editable"  class="header-toggle" style="display:none">
				<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640"><path d="M535.6 85.7C513.7 63.8 478.3 63.8 456.4 85.7L432 110.1L529.9 208L554.3 183.6C576.2 161.7 576.2 126.3 554.3 104.4L535.6 85.7zM236.4 305.7C230.3 311.8 225.6 319.3 222.9 327.6L193.3 416.4C190.4 425 192.7 434.5 199.1 441C205.5 447.5 215 449.7 223.7 446.8L312.5 417.2C320.7 414.5 328.2 409.8 334.4 403.7L496 241.9L398.1 144L236.4 305.7zM160 128C107 128 64 171 64 224L64 480C64 533 107 576 160 576L416 576C469 576 512 533 512 480L512 384C512 366.3 497.7 352 480 352C462.3 352 448 366.3 448 384L448 480C448 497.7 433.7 512 416 512L160 512C142.3 512 128 497.7 128 480L128 224C128 206.3 142.3 192 160 192L256 192C273.7 192 288 177.7 288 160C288 142.3 273.7 128 256 128L160 128z"/></svg>
				<span>
					Rollback: Read-only
				</span>
				</button>
			<button id="toggle-diff">&#x25C0; Hide Rollback</button>
		</div>
		<div id="validation-banner"></div>
		<div id="no-selection">Add a stored procedure to get started.</div>
		<div id="monaco-wrapper">
			<div id="diff-container"></div>
			<div id="plain-container"  style="display:none"></div>
			<div id="split-container" style="display:none">
				<div id="split-left"></div>
				<div id="split-right"></div>
			</div>
		</div>
	</div>

	<!-- Context menu (shared for all proc items) -->
	<div id="context-menu">
		<div class="ctx-item" id="ctx-refetch">Re-fetch original from database</div>
		<div class="ctx-item" id="ctx-rename">Rename</div>
		<div class="ctx-separator"></div>
		<div class="ctx-item danger" id="ctx-remove">Remove from change script</div>
	</div>

	<!-- Add / Create Procedure Dialog -->
	<div id="search-overlay">
		<div id="search-box">

			<!-- View 1: Search existing DB procedures -->
			<div id="search-view">
				<div id="search-header">
					<input id="search-input" type="text" placeholder="Search stored procedures&#x2026;"
						autocomplete="off">
					<button id="search-close" title="Close">&#x2715;</button>
				</div>
				<div id="search-results"></div>
				<div id="search-footer">
					<button id="btn-create-new">&plus; Create New Stored Procedure</button>
				</div>
			</div>

			<!-- View 2: Create new procedure -->
			<div id="create-view">
				<div id="create-title">Create New Stored Procedure</div>
				<input id="create-input" type="text" placeholder="e.g. uspMyNewProcedure" autocomplete="off">
				<div id="create-hint">The name will be used in both the CREATE PROCEDURE body and the rollback DROP
					stub.</div>
				<div id="create-error"></div>
				<div id="create-actions">
					<button class="btn" id="btn-create-confirm">Create</button>
					<button class="btn secondary" id="btn-create-cancel">&#x2190; Back</button>
				</div>
			</div>

		</div>
	</div>

	<script>
		window.MonacoEnvironment = {
			getWorkerUrl: function () {
				var base = 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/';
				return 'data:text/javascript;charset=utf-8,' + encodeURIComponent(
					'self.MonacoEnvironment={baseUrl:"' + base + '"};' +
					'importScripts("' + base + 'vs/base/worker/workerMain.js");'
				);
			}
		};
	</script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>
	<script src="./script.js"></script>
</body>

</html>
